<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1d4ed8);
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.logo{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:50%;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
}

h2{
    text-align:center;
    margin:20px 0 8px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:500;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

.input-group input:focus{
    border-color:#2563eb;
    outline:none;
}

.password{
    position:relative;
}

.eye{
    position:absolute;
    right:15px;
    top:42px;
    cursor:pointer;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:15px 0 25px;
    font-size:14px;
}

.options a{
    color:#2563eb;
    text-decoration:none;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.footer{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.footer a{
    color:#2563eb;
    text-decoration:none;
}

#error{
    display:none;
    color:#dc2626;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">L</div>

<h2>Welcome Back</h2>
<p>Sign in to continue</p>

<div id="error"></div>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter your email"
required>
</div>

<div class="input-group password">
<label>Password</label>
<input
type="password"
id="password"
placeholder="Enter your password"
required>

<span class="eye" onclick="togglePassword()">👁️</span>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit">
Login
</button>

</form>

<div class="footer">
Don't have an account?
<a href="#">Register</a>
</div>

</div>

<script>

function togglePassword(){

const pass=document.getElementById("password");

pass.type=
pass.type==="password"?"text":"password";

}

document.getElementById("loginForm")
.addEventListener("submit",async function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const error=document.getElementById("error");

error.style.display="none";

/* Replace with your backend API */
try{

const response=await fetch("http://localhost:5000/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,
password

})

});

const data=await response.json();

if(response.ok){

alert("Login Successful");

window.location="dashboard.html";

}else{

error.style.display="block";
error.innerHTML=data.message;

}

}catch{

error.style.display="block";
error.innerHTML="Cannot connect to server.";

}

});

</script>

</body>
</html>
