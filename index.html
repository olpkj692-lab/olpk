<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Hub Pro</title>
  <link rel="stylesheet" href="web.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="hero">

    <div class="card">

      <h1>Upgrade Your Life 🚀</h1>
      <p>Choose your path and start learning today</p>

      <div class="grid">

        <button onclick="location.href='#'">
          🔥 Motivation Videos
        </button>

        <button onclick="location.href='skill.html'">
          🧠 Learning Skills
        </button>

        <button onclick="location.href='glowup.html'">
          ✨ Glow Up Tips
        </button>

      </div>

    </div>

  </div>
  <style>*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins", Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color:white;
}

/* MAIN CARD */
.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:40px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
}

/* TITLE */
h1{
  font-size:26px;
  margin-bottom:10px;
  background: linear-gradient(90deg,#ff0000,#ff7b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TEXT */
p{
  color:#bbb;
  margin-bottom:25px;
  font-size:14px;
}

/* BUTTON GRID */
.grid{
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* PREMIUM BUTTON */
button{
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
  color:white;
  background: linear-gradient(135deg,#ff0000,#ff4d00);
  box-shadow:0 10px 25px rgba(255,0,0,0.3);
  transition:0.3s ease;
  letter-spacing:0.5px;
}

/* HOVER EFFECT */
button:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 15px 35px rgba(255,0,0,0.5);
}

/* CLICK EFFECT */
button:active{
  transform:scale(0.98);
}</style>

</body>
</html>
