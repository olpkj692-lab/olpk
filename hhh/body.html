<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Skills Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#181818;
  position:sticky;
  top:0;
}

.logo{
  color:#ff0000;
  font-size:22px;
  font-weight:bold;
}

input{
  padding:10px;
  width:250px;
  border-radius:20px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#1f1f1f;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card .info{
  padding:10px;
}

.title{
  font-size:14px;
  margin-bottom:5px;
}

.tag{
  font-size:12px;
  color:#aaa;
}

/* POPUP VIDEO */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.popup video{
  width:80%;
  max-width:800px;
  border-radius:12px;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:30px;
  cursor:pointer;
}

.popup.show{
  display:flex;
}
</style>
</head>

<body>

<header>
  <div class="logo">body building</div>
</header>

<!-- GRID -->
<div class="grid" id="grid">

  <div class="card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
    <img src="https://picsum.photos/400/300?1">
    <div class="info">
      <div class="title">HTML Basics</div>
      <div class="tag">Web Development</div>
    </div>
  </div>

  <div class="card" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
    <img src="https://picsum.photos/400/300?2">
    <div class="info">
      <div class="title">CSS Styling</div>
      <div class="tag">Design</div>
    </div>
  </div>

  <div class="card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
    <img src="https://picsum.photos/400/300?3">
    <div class="info">
      <div class="title">JavaScript Intro</div>
      <div class="tag">Programming</div>
    </div>
  </div>
  <div class="card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
    <img src="https://picsum.photos/400/300?3">
    <div class="info">
      <div class="title">JavaScript Intro</div>
      <div class="tag">Programming</div>
    </div>
  </div>

  <div class="card" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
    <img src="https://picsum.photos/400/300?4">
    <div class="info">
      <div class="title">Python Basics</div>
      <div class="tag">Backend</div>
    </div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

  <div class="close" onclick="closeVideo()">✖</div>

  <video id="videoPlayer" controls></video>

</div>

<script>

function playVideo(url){
  document.getElementById("popup").classList.add("show");
  document.getElementById("videoPlayer").src = url;
  document.getElementById("videoPlayer").play();
}

function closeVideo(){
  document.getElementById("popup").classList.remove("show");
  document.getElementById("videoPlayer").pause();
  document.getElementById("videoPlayer").src = "";
}

/* SEARCH */
function searchVideos(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    let title = card.innerText.toLowerCase();
    card.style.display = title.includes(input) ? "block" : "none";
  });
}

</script>

</body>
</html>
