<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-size:22px;
  color:#ff0000;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

/* IMAGE CARD */
.card{
  position:relative;
  cursor:pointer;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  display:block;
}

.card .title{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:8px;
  font-size:14px;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.popup video{
  width:80%;
  max-width:800px;
  border-radius:12px;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:30px;
  cursor:pointer;
  color:white;
}

/* ANIMATION */
.popup.show{
  display:flex;
  animation:fade 0.3s ease;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<header>📚 My Course Gallery</header>

<!-- GRID -->
<div class="grid">

  <div class="card" onclick="openVideo('on.mp4')">
    <img src="3p5PDRtG93Y-HD.jpg">
    <div class="title">jawline</div>
  </div>

  <div class="card" onclick="openVideo('https://www.w3schools.com/html/movie.mp4')">
    <img src="https://picsum.photos/400/300?2">
    <div class="title">HTML Basics</div>
  </div>

  <div class="card" onclick="openVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
    <img src="https://picsum.photos/400/300?3">
    <div class="title">CSS Mastery</div>
  </div>

  <div class="card" onclick="openVideo('on.mp4')">
    <img src="https://picsum.photos/400/300?4">
    <div class="title">JavaScript Intro</div>
  </div>

</div>

<!-- POPUP VIDEO -->
<div class="popup" id="popup">

  <div class="close" onclick="closeVideo()">✖</div>

  <video id="videoPlayer" controls></video>

</div>

<script>

function openVideo(url){
  document.getElementById("popup").classList.add("show");
  document.getElementById("videoPlayer").src = url;
  document.getElementById("videoPlayer").play();
}

function closeVideo(){
  document.getElementById("popup").classList.remove("show");
  document.getElementById("videoPlayer").pause();
  document.getElementById("videoPlayer").src = "";
}

</script>

</body>
</html>
